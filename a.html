      border-radius: 12px;
      font-size: 17px;
      font-weight: 800;
      text-align: center;

      background: #e9f8ef;
      color: #145c35;

    function shuffleArray(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    function escapeText(text) {
      return String(text).replace(/'/g, "&#39;").replace(/\"/g, "&quot;");
    }

    function levenshtein(a, b) {
      const dp = Array.from({ length: a.length + 1 }, () => Array(b.length + 1).fill(0));
      for (let i = 0; i <= a.length; i++) dp[i][0] = i;
      for (let j = 0; j <= b.length; j++) dp[0][j] = j;
      for (let i = 1; i <= a.length; i++) {
        for (let j = 1; j <= b.length; j++) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          dp[i][j] = Math.min(
            dp[i - 1][j] + 1,
            dp[i][j - 1] + 1,
            dp[i - 1][j - 1] + cost
          );
        }
      }
      return dp[a.length][b.length];
    }

    function generateMisspellings(word) {
      const list = [];

      if (word.endsWith("ing")) {
        const stem = word.slice(0, -3);
        list.push(stem + "eing");
        list.push(stem + "ingg");
        list.push(stem + "in");
        list.push(stem + "inng");
      }

      if (word.includes("oo")) list.push(word.replace("oo", "o"));
      if (word.includes("o")) list.push(word.replace("o", "oo"));
      if (word.includes("a")) list.push(word.replace("a", "e"));
      if (word.includes("e")) list.push(word.replace("e", "a"));
      if (word.includes("i")) list.push(word.replace("i", "e"));
      if (word.includes("u")) list.push(word.replace("u", "o"));

      list.push(word + "e");
      if (word.length > 3) list.push(word.slice(0, -1));
      if (word.length > 3) list.push(word[0] + word);
      if (word.length > 4) list.push(word.slice(0, 2) + word[1] + word.slice(2));

      return list.filter(x => x && x !== word);
    }

    function makeChoices(question) {
      const verbNumber = question.id.split("-")[0];
      const wrongAnswers = originalQuestions
        .filter(q => q.id !== question.id)
        .map(q => q.answer);
      return shuffleArray([question.answer, ...shuffleArray(wrongAnswers).slice(0, 4)]);
    }

    function getWrongMemory() {
      try {
        const raw = localStorage.getItem(WRONG_KEY);
        const ids = raw ? JSON.parse(raw) : [];
        return Array.isArray(ids) ? ids : [];
      } catch (e) {
        return [];
      }
    }

    function setWrongMemory(ids) {
      const unique = [...new Set(ids)];
      localStorage.setItem(WRONG_KEY, JSON.stringify(unique));
      updateSavedCount();
    }

    function addWrong(id) {
      const ids = getWrongMemory();
      if (!ids.includes(id)) ids.push(id);
      setWrongMemory(ids);
    }

    function removeWrong(id) {
      const ids = getWrongMemory().filter(x => x !== id);
      setWrongMemory(ids);
    }

    function updateSavedCount() {
      const count = getWrongMemory().length;
      document.getElementById("savedCount").textContent = `保存ミス ${count}`;
      document.getElementById("wrongBtn").disabled = count === 0;
    }

    function saveState() {
      const data = { questions, currentIndex, score, answered, wrongs, currentChoice, finished, mode };
      localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    }

    function loadState() {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return false;
      try {
        const data = JSON.parse(raw);
        if (!data.questions || !Array.isArray(data.questions) || data.questions.length === 0) return false;
        questions = data.questions;
        currentIndex = data.currentIndex || 0;
        score = data.score || 0;
        answered = data.answered || false;
        wrongs = data.wrongs || [];
        currentChoice = data.currentChoice || null;
        finished = data.finished || false;
        mode = data.mode || "all";
        return true;
      } catch (e) {
        return false;
      }
    }

    function clearSave() {
      localStorage.removeItem(SAVE_KEY);
      if (autoNextTimer) clearTimeout(autoNextTimer);
    }

      let source = originalQuestions;

if (mode === "all") {

  });
}

if (mode === "wrong") {

        source = originalQuestions.filter(q => wrongIds.includes(q.id));

          updateSavedCount();
          return;
        }
      }

      questions = shuffleArray(JSON.parse(JSON.stringify(source)));
      questions.forEach(q => q.shuffledChoices = makeChoices(q));
      currentIndex = 0;
      score = 0;
      answered = false;
      wrongs = [];
      currentChoice = null;
      finished = false;

      if (!questions.length) return;
      updateProgress();
      updateScore();
      const q = questions[currentIndex];
      const modeText = mode === "wrong" ? "間違えた場所だけ" : "全問";
      const card = document.getElementById("card");

      card.innerHTML = `
        <div class="center"><span class="mode-label">${modeText}テスト</span></div>
        <div class="question-title">${q.word} の意味</div>
        <div class="question-sub">${currentIndex + 1} / ${questions.length}</div>
        <div class="choices">
          ${q.shuffledChoices.map(choice => `
            <button class="choice" data-choice="${escapeText(choice)}" onclick="answerQuestion('${escapeText(choice)}')">${choice}</button>
          `).join("")}
        </div>
        <div class="result" id="result"></div>
      `;

      if (answered) restoreAnsweredView();
    }

    function restoreAnsweredView() {
      const q = questions[currentIndex];
      const result = document.getElementById("result");
      const buttons = document.querySelectorAll(".choice");

      buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.dataset.choice === q.answer) btn.classList.add("correct");
        if (btn.dataset.choice === currentChoice && currentChoice !== q.answer) btn.classList.add("wrong");
      });

      if (currentChoice === q.answer) {
        result.textContent = "〇 正解！";
        result.className = "result ok";
      } else {
        result.textContent = `× 不正解　正解：${q.answer}`;
        result.className = "result ng";
      }
    }

    function answerQuestion(choice) {
      if (answered) return;
      answered = true;
      currentChoice = choice;

      const q = questions[currentIndex];
      const result = document.getElementById("result");
      const buttons = document.querySelectorAll(".choice");

      buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.dataset.choice === q.answer) btn.classList.add("correct");
        if (btn.dataset.choice === choice && choice !== q.answer) btn.classList.add("wrong");
      });

      if (choice === q.answer) {
        score++;
        result.textContent = "〇 正解！";
        result.className = "result ok";

        if (mode === "wrong") {
          removeWrong(q.id);
          result.textContent = "〇 正解！ 保存ミスから削除しました";
        }
      } else {
        result.textContent = `× 不正解　正解：${q.answer}`;
        result.className = "result ng";
        wrongs.push({ ...q, your: choice });
        addWrong(q.id);
      }

      updateScore();
      updateSavedCount();
      saveState();
      autoNextTimer = setTimeout(nextQuestion, 1000);
    }

    function nextQuestion() {
      currentIndex++;
      answered = false;
      currentChoice = null;

      if (currentIndex >= questions.length) {
        finishQuiz();
      } else {
        showQuestion();
        saveState();
      }
    }

    function finishQuiz() {
      finished = true;
      saveState();
      updateProgress(true);
      document.getElementById("startBtn").disabled = false;
      updateSavedCount();

      let wrongHtml = "";
      if (wrongs.length > 0) {
        wrongHtml = `
          <div class="wrong-list">
            <b>今回間違えた問題</b><br>
            ${wrongs.map(w => `・${w.word}：あなたの答え「${w.your}」 → 正解「${w.answer}」`).join("<br>")}
          </div>
        `;
      } else {
        wrongHtml = `<div class="wrong-list">今回のテストは全問正解です。</div>`;
      }

      const saved = getWrongMemory().length;
      document.getElementById("card").innerHTML = `
        <div class="finish">
          終了！<br>
          結果：${score} / ${questions.length}<br>
          保存中のミス：${saved}個
        </div>
        ${wrongHtml}
        <div class="next-area">
          <button onclick="startQuiz('all')">全問もう一回</button>
          <button onclick="startQuiz('wrong')" ${saved === 0 ? "disabled" : ""}>間違えた場所だけもう一回</button>
        </div>
      `;
    }

    function updateScore() {
      const total = questions.length || originalQuestions.length;
      document.getElementById("score").textContent = `${score} / ${total}`;
    }

    function updateProgress(done = false) {
      const total = questions.length || originalQuestions.length;
      const percent = done ? 100 : (currentIndex / total) * 100;
      document.getElementById("bar").style.width = `${percent}%`;
    }

    function resetCurrentQuiz() {
      clearSave();
      questions = [];
      currentIndex = 0;
      score = 0;
      answered = false;
      wrongs = [];
      currentChoice = null;
      finished = false;
      mode = "all";
      document.getElementById("startBtn").disabled = false;
      updateSavedCount();
      document.getElementById("score").textContent = `0 / ${originalQuestions.length}`;
      document.getElementById("bar").style.width = "0%";
      document.getElementById("card").innerHTML = `<div class="finish">スタートを押してください</div>`;
    }

    function clearWrongMemory() {
      localStorage.removeItem(WRONG_KEY);
      updateSavedCount();
      document.getElementById("card").innerHTML = `<div class="finish">保存したミスを消しました</div>`;
    }

    function init() {
      updateSavedCount();
      if (loadState()) {
        updateScore();
        document.getElementById("startBtn").disabled = !finished;
        document.getElementById("wrongBtn").disabled = !finished;
        if (finished) finishQuiz();
        else showQuestion();
      } else {
        resetCurrentQuiz();
      }
      updateSavedCount();
    }

    init();
  </script>
</body>
</html>
